<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>axon swarm</title>
<link data-trunk rel="rust" data-wasm-opt="z" />
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --muted:#8b949e;
          --accent:#58a6ff; --green:#3fb950; --red:#f85149; --yellow:#d29922; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:16px; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--panel); }
  header h1 { font-size:16px; margin:0; color:var(--accent); }
  header .model { color:var(--muted); }
  .spacer { flex:1; }
  button { background:#21262d; color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:6px 12px; cursor:pointer; font:inherit; }
  button:hover { border-color:var(--accent); }
  button.danger:hover { border-color:var(--red); color:var(--red); }
  main { display:grid; grid-template-columns: 360px 1fr; height:calc(100vh - 53px); }
  .left { border-right:1px solid var(--border); overflow-y:auto; padding:16px; }
  .right { overflow-y:auto; padding:16px; }
  textarea, select { width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:8px; font:inherit; }
  textarea { resize:vertical; min-height:64px; }
  .field { margin-bottom:10px; }
  label { display:block; color:var(--muted); margin-bottom:4px; font-size:12px; }
  .section { color:var(--muted); font-size:12px; margin:18px 0 8px; }
  .agent { border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:10px; background:var(--panel); cursor:pointer; }
  .agent.sel { border-color:var(--accent); }
  .agent .row { display:flex; align-items:center; gap:8px; }
  .agent .id { font-weight:bold; }
  .agent .task { color:var(--muted); font-size:12px; margin-top:4px; max-height:3em; overflow:hidden; }
  .badge { font-size:11px; padding:1px 7px; border-radius:10px; border:1px solid var(--border); }
  .badge.queued{color:var(--muted)} .badge.running{color:var(--accent);border-color:var(--accent)}
  .badge.done{color:var(--green);border-color:var(--green)} .badge.error{color:var(--red);border-color:var(--red)}
  .badge.cancelled{color:var(--yellow);border-color:var(--yellow)}
  .muted { color:var(--muted); }
  .log { white-space:pre-wrap; word-break:break-word; }
  .log .line { padding:2px 0; border-bottom:1px solid #1d2530; }
  .log .ev-tool { color:var(--yellow); } .log .ev-done { color:var(--green); }
  .log .ev-error { color:var(--red); } .log .ev-turn { color:var(--muted); }
  .empty { color:var(--muted); }
</style>
</head>
<body></body>
</html>
